set -e
echo "> cargo build --release --example rust_semantic_bench"
DECODER=$(cargo --config "target.'cfg(unix)'.runner = 'echo'" run -q --example rust_semantic_bench --release)
perf stat -r3 -e instructions,branches,cpu-cycles $DECODER
'''
allow_multiple = true

[action.profile-tinyhl]
